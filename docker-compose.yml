x-worker-env: &worker-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_TOPIC_REQUESTS: detection-requests
  REDIS_URL: redis://redis:6379
  UPLOAD_DIR: /data/uploads
  DEFAULT_CONFIDENCE_THRESHOLD: 0.5
  MAX_IMAGE_SIZE_MB: 10

services:
  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: street-sign-api:latest
    container_name: api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      <<: *worker-env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    profiles: ["cpu", ""]
    image: street-sign-worker:latest
    # Контейнеры будут именоваться docker compose с учётом масштаба: worker-1, worker-2, ...
    volumes:
      - ./data:/data
    environment:
      <<: *worker-env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Масштабирование задаётся при запуске: docker compose up --scale worker=2
  worker-gpu:
    build:
      context: .
      dockerfile: Dockerfile.worker-gpu
    image: street-sign-worker-gpu:latest
    profiles: ["gpu"]
    volumes:
      - ./data:/data
    environment:
      <<: *worker-env
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]