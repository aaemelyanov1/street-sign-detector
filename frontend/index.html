<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Распознавание дорожных знаков</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Детектор дорожных знаков</h1>
            <p>Загрузите изображение для анализа с помощью ИИ</p>
        </header>

        <main>
            <section class="card" id="upload-section">
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-zone-content">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="upload-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <p class="drop-zone-text">Перетащите изображение сюда или <span class="text-primary">выберите файл</span></p>
                        <p class="drop-zone-hint">JPEG / PNG до 10 МБ</p>
                        <input type="file" id="file-input" accept="image/jpeg, image/png" hidden>
                    </div>
                </div>
            </section>

            <section class="card hidden" id="preview-section">
                <div class="canvas-container">
                    <canvas id="image-canvas"></canvas>
                </div>
                
                <div class="controls">
                    <div class="settings-group">
                        <label for="confidence-slider">
                            Порог уверенности: <span id="confidence-value">0.50</span>
                        </label>
                        <input type="range" id="confidence-slider" min="0" max="1" step="0.05" value="0.5">
                    </div>
                    
                    <div class="actions-group">
                        <button class="btn btn-secondary" id="btn-clear">Очистить</button>
                        <button class="btn btn-primary" id="btn-detect">Распознать</button>
                    </div>
                </div>
            </section>

            <section class="card hidden status-card" id="status-section">
                <div class="spinner"></div>
                <p id="status-text">Идет обработка...</p>
            </section>

            <section class="card hidden" id="results-section">
                <div class="results-header">
                    <h2>Найденные знаки</h2>
                    <span class="badge" id="detections-count">0</span>
                </div>
                
                <div class="detections-list" id="detections-list">
                    </div>

                <div class="export-actions">
                    <button class="btn btn-outline" id="btn-export-json">Сохранить JSON</button>
                    <button class="btn btn-outline" id="btn-export-csv">Сохранить CSV</button>
                </div>
            </section>
        </main>
    </div>

    <div id="toast-container"></div>

    <script src="js/app.js"></script>
</body>
</html>
