server {
    listen 80;
    server_name localhost;

    # gzip-сжатие для статики и API-ответов
    gzip on;
    gzip_types application/json text/plain text/css application/javascript text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 5;

    # Увеличиваем максимальный размер загружаемого файла
    client_max_body_size 30M;

    # Статика фронтенда
    root /usr/share/nginx/html;
    index index.html;

    # Проксируем API-запросы на FastAPI
    location /detect {
        proxy_pass http://api:8000;
    }
    location /result/ {
        proxy_pass http://api:8000;
    }
    location /health {
        proxy_pass http://api:8000;
    }
    location /ready {
        proxy_pass http://api:8000;
    }
    location /docs {
        proxy_pass http://api:8000;
    }
    location /openapi.json {
        proxy_pass http://api:8000;
    }

    # Всё остальное – отдаём index.html (для SPA-подобного поведения)
    location / {
        try_files $uri $uri/ /index.html;
    }
}